<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lista de Tareas</title>
<style>
body {
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

.input-container {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.task-container {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    width: 100%;
    max-width: 800px;
}

.task {
    width: 200px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px;
    background-color: #ccc;
    border-radius: 5px;
}

.task.completed {
    background-color: #4CAF50;
}

.task-text {
    flex: 1;
}

.button-container {
    display: flex;
    gap: 5px;
}

button {
    padding: 5px 10px;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="input-container">
    <input type="text" id="taskInput" placeholder="Escribe una tarea pendiente">
    <button onclick="addTask()">Agregar</button>
</div>

<div class="task-container" id="taskContainer"></div>

<script>
function addTask() {
    let taskText = document.getElementById("taskInput").value;
    if (taskText.trim() === "") return;

    let taskDiv = document.createElement("div");
    taskDiv.className = "task";

    let textSpan = document.createElement("span");
    textSpan.className = "task-text";
    textSpan.textContent = taskText;

    let buttonContainer = document.createElement("div");
    buttonContainer.className = "button-container";

    let completeBtn = document.createElement("button");
    completeBtn.textContent = "Completar";
    completeBtn.onclick = function() {
        taskDiv.classList.toggle("completed");
    };

    let deleteBtn = document.createElement("button");
    deleteBtn.textContent = "Eliminar";
    deleteBtn.onclick = function() {
        taskDiv.parentElement.removeChild(taskDiv);
    };

    buttonContainer.appendChild(completeBtn);
    buttonContainer.appendChild(deleteBtn);

    taskDiv.appendChild(textSpan);
    taskDiv.appendChild(buttonContainer);

    document.getElementById("taskContainer").appendChild(taskDiv);

    document.getElementById("taskInput").value = "";
}
</script>

</body>
</html>
