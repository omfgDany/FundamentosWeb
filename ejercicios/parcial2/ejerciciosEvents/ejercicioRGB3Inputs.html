<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RGB Cards</title>
<style>
.container {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.card {
    width: 100px;
    height: 100px;
    display: flex;
    align-items:start;
    justify-content: center;
    color: white;
    font-weight: bold;
}
</style>
</head>
<body>

<div>
    <input type="text" id="texto" placeholder="Texto libre">
    <button onclick="agregar()">Agregar</button>
</div>

<label for="r">R</label>
<input type="number" id="r" min="0" max="255">
<label for="g">G</label>
<input type="number" id="g" min="0" max="255">
<label for="b">B</label>
<input type="number" id="b" min="0" max="255">

<div class="container" id="contenedor"></div>

<script>
function agregar() {
    let r = document.getElementById("r").value;
    let g = document.getElementById("g").value;
    let b = document.getElementById("b").value;
    let texto = document.getElementById("texto").value;

    let div = document.createElement("div");
    div.className = "card";
    div.style.backgroundColor = "rgb(" + r + "," + g + "," + b + ")";
    div.textContent = texto;

    document.getElementById("contenedor").appendChild(div);
}
</script>

</body>
</html>
