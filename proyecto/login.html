<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión - RecetaCreativa</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
      background: var(--bg, #f9f9f7);
    }
    .auth-card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 420px;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .auth-logo span {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--primary, #f97316);
      letter-spacing: -1px;
    }
    .auth-logo p {
      color: var(--muted, #888);
      font-size: 0.95rem;
      margin-top: 4px;
    }
    .auth-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--text, #1a1a1a);
      text-align: center;
    }
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text, #1a1a1a);
      margin-bottom: 6px;
    }
    .input-icon-wrap {
      position: relative;
    }
    .input-icon-wrap i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted, #aaa);
      font-size: 0.95rem;
    }
    .input-icon-wrap input {
      width: 100%;
      padding: 11px 14px 11px 40px;
      border: 1.5px solid #e0e0e0;
      border-radius: 9px;
      font-size: 0.97rem;
      outline: none;
      transition: border 0.2s;
      box-sizing: border-box;
      background: #fafafa;
    }
    .input-icon-wrap input:focus {
      border-color: var(--primary, #f97316);
      background: #fff;
    }
    .toggle-pass {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--muted, #aaa);
      font-size: 0.95rem;
      background: none;
      border: none;
      padding: 0;
    }
    .btn-auth {
      width: 100%;
      padding: 13px;
      background: var(--primary, #f97316);
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-auth:hover { background: #e05e00; }
    .btn-auth:active { transform: scale(0.98); }
    .auth-footer {
      text-align: center;
      margin-top: 22px;
      font-size: 0.93rem;
      color: var(--muted, #888);
    }
    .auth-footer a {
      color: var(--primary, #f97316);
      font-weight: 600;
      text-decoration: none;
    }
    .auth-footer a:hover { text-decoration: underline; }
    .alert {
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
    }
    .alert.error   { background: #fdecea; color: #b71c1c; border: 1px solid #f5c6cb; display: block; }
    .alert.success { background: #e8f5e9; color: #1b5e20; border: 1px solid #c8e6c9; display: block; }
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
      color: var(--muted, #aaa);
      font-size: 0.85rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e0e0e0;
    }
  </style>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <span>🍽️ RecetaCreativa</span>
      <p>Tu comunidad de cocina</p>
    </div>

    <h2 class="auth-title">Iniciar Sesión</h2>

    <div class="alert" id="alert-msg"></div>

    <div class="form-group">
      <label for="email">Correo electrónico</label>
      <div class="input-icon-wrap">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email">
      </div>
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <div class="input-icon-wrap">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        <button class="toggle-pass" type="button" onclick="togglePass()" tabindex="-1">
          <i class="fa-regular fa-eye" id="eye-icon"></i>
        </button>
      </div>
    </div>

    <button class="btn-auth" id="btn-login" onclick="handleLogin()">
      <span id="btn-text">Entrar</span>
    </button>

    <div class="divider">o</div>

    <div class="auth-footer">
      ¿No tienes cuenta? <a href="register.html">Regístrate gratis</a>
    </div>
    <div class="auth-footer" style="margin-top:10px">
      <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Volver al inicio</a>
    </div>
  </div>
</div>

<script>
function togglePass() {
  const input = document.getElementById('password');
  const icon  = document.getElementById('eye-icon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'fa-regular fa-eye-slash';
  } else {
    input.type = 'password';
    icon.className = 'fa-regular fa-eye';
  }
}

function showAlert(msg, type = 'error') {
  const el = document.getElementById('alert-msg');
  el.textContent = msg;
  el.className = `alert ${type}`;
}

async function handleLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('btn-login');
  const btnText  = document.getElementById('btn-text');

  if (!email || !password) {
    showAlert('Por favor completa todos los campos.');
    return;
  }

  btn.disabled = true;
  btnText.textContent = 'Verificando...';

  try {
    const res  = await fetch('auth/login.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (data.success) {
      showAlert('¡Bienvenido! Redirigiendo...', 'success');
      setTimeout(() => window.location.href = 'index.html', 1000);
    } else {
      showAlert(data.error || 'Credenciales incorrectas.');
      btn.disabled = false;
      btnText.textContent = 'Entrar';
    }
  } catch (e) {
    showAlert('Error de conexión con el servidor.');
    btn.disabled = false;
    btnText.textContent = 'Entrar';
  }
}

// Permitir Enter para iniciar sesión
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});
</script>
</body>
</html>
