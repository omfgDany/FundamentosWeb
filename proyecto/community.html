<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comunidad - RecetaCreativa</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<div id="header"></div>
<script src="assets/js/session.js"></script>
<script src="assets/js/header.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    if (typeof checkSession === "function") {
      checkSession();
    }
  });
</script>

<div class="container">
  <div class="community-header">
    <h1 class="section-title" style="font-size:2rem; margin-bottom:8px">Comunidad</h1>
    <p class="text-muted" style="margin-bottom:28px">Explora recetas compartidas por nuestra comunidad de cocineros creativos</p>

    <div class="filter-row" aria-label="Ordenar recetas">
      <button class="btn btn-outline active" id="sort-alfabetico" data-sort="alfabetico">
        <i class="fa-solid fa-arrow-down-a-z"></i> Alfabético
      </button>
      <button class="btn btn-outline" id="sort-fecha" data-sort="fecha">
        <i class="fa-regular fa-clock"></i> Más recientes
      </button>
      <button class="btn btn-outline" id="sort-popular" data-sort="popular">
        <i class="fa-solid fa-heart"></i> Más likes
      </button>
    </div>

    <div class="category-label">
      <i class="fa-solid fa-filter"></i>
      <strong>Categorías</strong>
    </div>
    <div class="category-row" id="category-row" aria-label="Filtrar por categoría"></div>

    <p class="result-count" id="result-count">Mostrando 0 recetas</p>
  </div>

  <div class="grid-3" id="community-grid"></div>

  <div id="community-empty" class="community-empty">
    <p>No se encontraron recetas con estos filtros.</p>
    <button class="btn btn-outline" id="clear-filters">Limpiar filtros</button>
  </div>
</div>

<script src="assets/js/recetas.js"></script>
</body>
</html>
