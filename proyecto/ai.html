<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comunidad - RecetaCreativa</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<!-- Header reutilizable -->
<div id="header"></div>
<script src="header.js"></script>

<!-- ===== AI CHAT PAGE ===== -->
 <div class ="container" style ="padding:64px 0; text-align:center">
    <h1 class="section-title" style="font-size:2rem; margin-bottom:8px">Chat con IA</h1>
    <p class="text-muted" style="margin-bottom:28px">¿Tienes dudas sobre una receta? ¿Quieres sugerencias de ingredientes? ¡Pregunta a nuestra IA!</p>
    <div class="bienvenida-search-row" style="justify-content:center; margin-bottom:32px">
      <input id="ai-input" type="text" placeholder="Escribe tu pregunta..." style="width:60%; max-width:400px; padding:12px 16px; border:1px solid var(--muted); border-radius:4px">
      <button class="bienvenida-search-btn" id="ai-submit" style="margin-left:8px; padding:12px 16px">
        <i class="fa-solid fa-paper-plane"></i>
      </button>
    </div>
    <div id="ai-response" style="max-width:600px; margin:0 auto; text-align:left; background:var(--light); padding:16px; border-radius:4px; box-shadow:0 2px 6px rgba(0,0,0,0.1)"></div>
  </div>
    <script src="ai.js"></script>
