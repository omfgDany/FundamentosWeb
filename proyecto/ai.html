<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat con IA - RecetaCreativa</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<div id="header"></div>
<script src="header.js"></script>
<script src="session.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    if (typeof checkSession === "function") {
      checkSession();
    }
  });
</script>

<main class="ai-page">
  <h1 class="section-title" style="font-size:2rem; margin-bottom:8px">Chat con IA</h1>
  <p class="text-muted" style="margin-bottom:24px">Pregunta por ideas de recetas, ingredientes o formas sencillas de cocinar algo nuevo.</p>

  <section class="chat-box" aria-label="Chat con asistente de cocina">
    <div class="chat-header">
      <i class="fa-solid fa-robot"></i>
      Asistente de cocina
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <form class="chat-input-row" id="chat-form">
      <input id="chat-input" type="text" placeholder="Escribe tu pregunta..." autocomplete="off">
      <button class="btn btn-secondary" id="chat-send" type="submit">
        <i class="fa-solid fa-paper-plane"></i>
      </button>
    </form>
  </section>
</main>

<script src="ai.js"></script>
</body>
</html>
